<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Dressup By May">
    
    <title>Dressup By May - Pro Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fce4ec; margin: 0; padding: 10px; color: #333; }
        .app-container { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; position: relative; overflow: hidden; }
        
        /* Header */
        .header { text-align: center; border-bottom: 2px solid #d81b60; padding-bottom: 12px; margin-bottom: 15px; }
        .header img.shop-logo { width: 100%; max-width: 200px; height: auto; border-radius: 8px; margin-bottom: 8px; }
        .header .shop-address { color: #555; font-size: 11px; line-height: 1.4; }
        
        .inv-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #d81b60; margin-bottom: 10px; border-bottom: 1px dashed #f8bbd0; padding-bottom: 5px; }

        /* Inputs */
        .input-group { display: flex; align-items: center; margin-bottom: 10px; }
        .input-group label { width: 120px; font-weight: bold; color: #555; font-size: 13px; }
        .input-group input, .input-group select { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background-color: #fafafa; }
        .input-group input:focus { border-color: #d81b60; outline: none; background-color: #fff; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #fce4ec; color: #d81b60; padding: 10px 4px; font-size: 13px; border: 1px solid #d81b60; }
        td { padding: 4px 2px; border: 1px solid #f8bbd0; }
        td input { width: 100%; padding: 10px 4px; border: none; font-size: 14px; background: transparent; }
        
        .add-btn { width: 100%; background: #fff; color: #d81b60; border: 2px dashed #d81b60; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* Summary */
        .summary-box { background: #fff0f4; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1.5px solid #d81b60; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 14px; }
        .total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; color: #d81b60; margin-top: 8px; padding-top: 8px; border-top: 2px solid #d81b60; }
        
        .thank-you { display: none; margin-top: 20px; font-size: 14px; color: #d81b60; font-style: italic; text-align: center; }

        /* Report & History */
        .top-nav { max-width: 600px; margin: 0 auto 10px auto; display: flex; gap: 10px; }
        .nav-btn { flex: 1; background: #d81b60; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #historyView { display: none; max-width: 600px; margin: auto; background: #fff; border-radius: 12px; padding: 15px; min-height: 90vh; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #f8bbd0; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; }
        
        .record-card { background: #fffafb; border: 1px solid #f8bbd0; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #fce4ec; }
        
        /* Export Mode */
        .app-container.exporting .add-btn, .app-container.exporting .remove-btn { display: none !important; }
        .app-container.exporting .thank-you { display: block; }
        .app-container.exporting { border: 2px solid #d81b60; }
        
        #generatedImg { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="mainView">
    <div class="top-nav">
        <button class="nav-btn" onclick="openHistory()">📊 Sales Report / Search</button>
    </div>

    <div class="app-container" id="invoiceCard">
        <div class="header">
            <img src="logo.jpg" alt="Logo" class="shop-logo">
            <p class="shop-address">No.428(A), Thuta Street, South Okkalapa, Yangon. <strong>Tel: +95 9 509 5013</strong></p>
        </div>

        <div class="inv-meta">
            <span id="displayInvId">ID: INV-LOADING</span>
            <span id="displayDate">Date: 01-Jan-2026</span>
        </div>

        <div class="input-group">
            <label>Customer</label>
            <input type="text" id="custName" placeholder="Name" onfocus="this.select()">
        </div>
        <div class="input-group">
            <label>Phone</label>
            <input type="text" id="phone" placeholder="09..." onfocus="this.select()">
        </div>
        <div class="input-group">
            <label>Address</label>
            <input type="text" id="address" placeholder="Address" onfocus="this.select()">
        </div>
        <div class="input-group">
            <label>Note</label>
            <input type="text" id="note" placeholder="Remark" onfocus="this.select()">
        </div>
        <div class="input-group">
            <label>Payment</label>
            <select id="paymentMethod">
                <option value="KPay">KPay</option>
                <option value="WavePay">WavePay</option>
                <option value="AYA Pay">AYA Pay</option>
                <option value="COD">COD (Cash on Delivery)</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th style="width: 40px;">Qty</th>
                    <th style="width: 80px;">Price</th>
                    <th style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="itemsContainer">
                <tr>
                    <td><input type="text" class="itemName" placeholder="Zara"></td>
                    <td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" value="0" oninput="calculateTotal()"></td>
                    <td><button onclick="this.closest('tr').remove(); calculateTotal()" style="background:red; color:white; border:none; border-radius:4px;">X</button></td>
                </tr>
            </tbody>
        </table>
        
        <button class="add-btn" onclick="addItem()">+ Add Item</button>

        <div class="summary-box">
            <div class="summary-row"><span>Subtotal:</span><span id="subTotal">0</span> Ks</div>
            <div class="summary-row"><span>Delivery:</span><input type="number" id="deliFee" value="0" oninput="calculateTotal()" style="width:80px; text-align:right;"></div>
            <div class="summary-row" style="color: #d81b60; font-weight:bold;"><span>Discount:</span><input type="number" id="discount" value="0" oninput="calculateTotal()" style="width:80px; text-align:right; color:#d81b60; font-weight:bold;"></div>
            <div class="total-row"><span>Total:</span><span id="finalTotal">0</span> Ks</div>
        </div>

        <div class="thank-you">~ Thank You For Shopping With May ~</div>
    </div>

    <div style="margin-top: 20px;">
        <button class="nav-btn" style="width:100%; padding:15px; font-size:16px;" id="saveBtn" onclick="saveAsImage()">Save & Print Invoice</button>
        <p id="loadMsg" style="display:none; text-align:center; color:#d81b60; font-weight:bold;">Processing... Please wait...</p>
    </div>
</div>

<div id="historyView">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="color:#d81b60; margin:0;">Sales Search</h2>
        <button onclick="closeHistory()" style="padding:8px 15px; border-radius:6px; border:none; background:#555; color:white;">Back</button>
    </div>
    
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search by Customer Name..." oninput="filterHistory()">
    
    <div id="historyList">Loading sales data...</div>
</div>

<div id="resultView" style="display:none; text-align:center; padding:20px;">
    <img id="generatedImg" src="">
    <button class="nav-btn" style="width:100%; margin-top:20px; background:#555;" onclick="goBackMain()">« Create New Invoice</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLgvYEDVw0mgftIaF0DgzCQapiMTPVuE_5eTCxRknJHE0_h-xJO5Zz1zwOu_DTY-KP/exec";
    let allRecords = [];

    // Auto Invoice ID Generator
    function generateInvId() {
        let now = new Date();
        let datePart = now.getFullYear().toString().slice(-2) + 
                       (now.getMonth()+1).toString().padStart(2,'0') + 
                       now.getDate().toString().padStart(2,'0');
        let randomPart = Math.floor(100 + Math.random() * 900);
        return "INV-" + datePart + "-" + randomPart;
    }

    function init() {
        document.getElementById('displayInvId').innerText = "ID: " + generateInvId();
        let now = new Date();
        document.getElementById('displayDate').innerText = "Date: " + now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
    }
    window.onload = init;

    function calculateTotal() {
        let sub = 0;
        document.querySelectorAll('#itemsContainer tr').forEach(row => {
            let q = row.querySelector('.qty').value || 0;
            let p = row.querySelector('.price').value || 0;
            sub += (q * p);
        });
        let deli = parseInt(document.getElementById('deliFee').value || 0);
        let disc = parseInt(document.getElementById('discount').value || 0);
        let final = sub + deli - disc;
        
        document.getElementById('subTotal').innerText = sub.toLocaleString();
        document.getElementById('finalTotal').innerText = final.toLocaleString();
        return final;
    }

    function addItem() {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="itemName" placeholder="Item"></td>
                        <td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td>
                        <td><input type="number" class="price" value="0" oninput="calculateTotal()"></td>
                        <td><button onclick="this.closest('tr').remove(); calculateTotal()" style="background:red; color:white; border:none; border-radius:4px;">X</button></td>`;
        document.getElementById('itemsContainer').appendChild(tr);
    }

    function saveRecord() {
        let items = [];
        document.querySelectorAll('#itemsContainer tr').forEach(row => {
            let n = row.querySelector('.itemName').value;
            let q = row.querySelector('.qty').value;
            let p = row.querySelector('.price').value;
            if(n) items.push(`${q}x ${n} (${p})`);
        });

        let fd = new URLSearchParams();
        fd.append('action', 'insert');
        fd.append('invId', document.getElementById('displayInvId').innerText.replace('ID: ',''));
        fd.append('date', new Date().toLocaleDateString('en-CA')); // YYYY-MM-DD
        fd.append('time', new Date().toLocaleTimeString());
        fd.append('customer', document.getElementById('custName').value || 'Guest');
        fd.append('payment', document.getElementById('paymentMethod').value);
        fd.append('items', items.join(' | '));
        fd.append('discount', document.getElementById('discount').value || 0);
        fd.append('totalAmount', calculateTotal());

        fetch(SCRIPT_URL, { method: 'POST', body: fd });
    }

    function openHistory() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('historyView').style.display = 'block';
        fetch(SCRIPT_URL + "?t=" + Date.now()).then(r => r.json()).then(data => {
            allRecords = data.reverse();
            renderHistory(allRecords);
        });
    }

    function renderHistory(data) {
        let container = document.getElementById('historyList');
        container.innerHTML = data.map(r => `
            <div class="record-card">
                <div style="display:flex; justify-content:space-between; font-weight:bold; color:#d81b60;">
                    <span>${r.customer}</span>
                    <span>${parseInt(r.totalAmount).toLocaleString()} Ks</span>
                </div>
                <div style="font-size:11px; color:#888; margin-bottom:10px;">ID: ${r.invId} | ${r.date} | Pay: ${r.payment}</div>
                ${r.items.split(' | ').map(i => `<div class="item-row"><span>🛍️ ${i.split(' (')[0]}</span><span>${i.split(' (')[1]?.replace(')','') || ''} Ks</span></div>`).join('')}
                ${r.discount > 0 ? `<div style="text-align:right; font-size:12px; color:red; margin-top:5px;">Discount: -${parseInt(r.discount).toLocaleString()} Ks</div>` : ''}
            </div>
        `).join('') || "No records found.";
    }

    function filterHistory() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allRecords.filter(r => r.customer.toLowerCase().includes(val));
        renderHistory(filtered);
    }

    function closeHistory() {
        document.getElementById('historyView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
    }

    function saveAsImage() {
        saveRecord();
        let card = document.getElementById('invoiceCard');
        card.classList.add('exporting');
        document.getElementById('saveBtn').style.display = 'none';
        document.getElementById('loadMsg').style.display = 'block';

        // Replace inputs with text for photo
        let inputs = card.querySelectorAll('input, select');
        inputs.forEach(i => {
            let s = document.createElement('span');
            s.className = 'temp-text';
            s.innerText = i.value || (i.tagName === 'SELECT' ? '' : ' ');
            i.style.display = 'none';
            i.parentNode.insertBefore(s, i);
        });

        setTimeout(() => {
            html2canvas(card, {scale:2, useCORS:true}).then(canvas => {
                document.getElementById('generatedImg').src = canvas.toDataURL('image/jpeg', 0.9);
                document.getElementById('mainView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
                
                // Reset for next
                card.classList.remove('exporting');
                card.querySelectorAll('.temp-text').forEach(t => t.remove());
                inputs.forEach(i => i.style.display = '');
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('loadMsg').style.display = 'none';
            });
        }, 500);
    }

    function goBackMain() {
        location.reload(); // Quick reset
    }
</script>
</body>
</html>
