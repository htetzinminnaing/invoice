<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Dressup By May - Invoice & Sales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* Base Mobile Design */
        body { font-family: Arial, sans-serif; background-color: #fce4ec; margin: 0; padding: 10px; color: #333; }
        .app-container { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding-bottom: 25px; max-width: 600px; margin: auto; position: relative; overflow: hidden; }
        
        .watermark { display: none; }
        
        /* Top Navigation */
        .top-nav { max-width: 600px; margin: 0 auto 10px auto; text-align: right; }
        .report-btn { background: #d81b60; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 2px 5px rgba(216,27,96,0.2); }
        
        /* Header Logo Styling */
        .header { text-align: center; border-bottom: 2px solid #d81b60; padding-bottom: 12px; margin-bottom: 15px; z-index: 2; position: relative; }
        .header img.shop-logo { width: 100%; max-width: 250px; height: auto; border-radius: 8px; margin-bottom: 8px; }
        .header .shop-address { color: #555; font-size: 11px; margin-top: 5px; line-height: 1.5; }
        
        /* Form Inputs */
        .input-group { display: flex; align-items: center; margin-bottom: 12px; z-index: 2; position: relative; }
        .input-group label { width: 110px; min-width: 110px; font-weight: bold; color: #555; font-size: 13px; white-space: nowrap; flex-shrink: 0; }
        .input-group input { flex: 1; min-width: 0; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background-color: #fafafa; box-sizing: border-box; }
        .input-group input:focus { border-color: #d81b60; outline: none; background-color: #fff; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; z-index: 2; position: relative; }
        th { background-color: #fce4ec; color: #d81b60; padding: 10px 4px; text-align: left; font-size: 13px; border-radius: 4px 4px 0 0; white-space: nowrap; border: 1px solid #d81b60; }
        td { padding: 4px 2px; border-bottom: 1px solid #eee; border: 1px solid #f8bbd0; }
        td input { width: 100%; padding: 10px 4px; border: none; border-radius: 4px; box-sizing: border-box; font-size: 14px; background: transparent; }
        td input:focus { outline: none; }
        
        /* Buttons */
        .remove-btn { background: #ff5252; color: white; border: none; border-radius: 4px; padding: 8px 10px; font-size: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .add-btn { width: 100%; background-color: #fce4ec; color: #d81b60; border: 2px dashed #d81b60; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; z-index: 2; position: relative; }
        
        /* Summary Box */
        .summary-box { background: #fff0f4; padding: 12px; border-radius: 8px; margin-top: 15px; z-index: 2; position: relative; border: 1.5px solid #d81b60; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; color: #555; }
        .summary-row span { white-space: nowrap; font-weight: bold; }
        .summary-row input { width: 90px; padding: 8px; text-align: right; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-weight: bold; background: #fff; }
        .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; color: #d81b60; margin-top: 8px; padding-top: 8px; border-top: 2px solid #d81b60; }
        .total-row span { white-space: nowrap; }
        
        .thank-you { display: block; margin-top: 25px; font-size: 14px; color: #d81b60; font-style: italic; text-align: center; font-weight: bold; display: none; }

        /* Export Mode CSS */
        .app-container.exporting { box-shadow: none; padding: 20px; border: 2px solid #d81b60; border-radius: 15px; background: #fff; }
        .app-container.exporting .watermark { display: flex; justify-content: center; align-items: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none; opacity: 0.12; }
        .app-container.exporting .watermark img { width: 80%; max-width: 400px; height: auto; }
        .app-container.exporting .add-btn, .app-container.exporting .remove-btn { display: none !important; }
        .app-container.exporting th:last-child, .app-container.exporting td:last-child { display: none !important; }
        .app-container.exporting .summary-row input { border: none; background: transparent; padding: 0; }
        .app-container.exporting .header { border-bottom: 2px solid #d81b60; }
        .app-container.exporting .total-row { border-top: 2px solid #d81b60 !important; }
        .app-container.exporting .thank-you { display: block; }

        .controls-container { max-width: 600px; margin: 20px auto 0 auto; padding: 0 10px; }
        .print-btn { display: block; width: 100%; padding: 14px; background-color: #d81b60; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(216,27,96,0.2); }
        .print-btn:active { transform: scale(0.98); }
        #loadingMsg { display: none; text-align: center; color: #d81b60; font-weight: bold; margin-top: 15px; font-size: 14px; }
        
        .temp-text { flex: 1; min-width: 0; font-size: 14px; color: #000; padding: 0 10px; box-sizing: border-box; overflow-wrap: break-word; }

        /* Image Result View */
        #resultView { display: none; padding: 15px; max-width: 600px; margin: auto; min-height: 100vh; background-color: #fce4ec; }
        .result-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .result-card img { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .back-btn { background: #555; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* Sales History View (Online) */
        #historyView { display: none; padding: 10px; max-width: 600px; margin: auto; min-height: 100vh; background-color: #fce4ec; }
        .history-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f8bbd0; padding-bottom: 10px; margin-bottom: 15px; }
        .history-header h2 { color: #d81b60; margin: 0; font-size: 20px; }
        .close-history { background: #555; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-group input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .filter-group button { background: #d81b60; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .total-sales-badge { background: #fff0f4; border: 1px dashed #d81b60; padding: 15px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; color: #d81b60; margin-bottom: 15px; }
        
        .record-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .record-item:last-child { border-bottom: none; }
        .record-title { font-weight: bold; color: #333; font-size: 14px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .record-detail { color: #777; font-size: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
        .record-amount { color: #d81b60; font-weight: bold; font-size: 15px; }
        
        .delete-record-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        /* Loading Animation */
        .loading-text { text-align: center; color: #d81b60; font-weight: bold; padding: 20px 0; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="top-nav">
        <button class="report-btn" onclick="openHistory()">📊 Sales Report</button>
    </div>

    <div class="app-container" id="invoiceCard">
        <div class="watermark">
            <img src="logo.jpg" alt="Watermark Logo">
        </div>

        <div class="header">
            <img src="logo.jpg" alt="Dressup By May Logo" class="shop-logo">
            <p class="shop-address">
                No.428(A), Thuta Street, (4) Ward, South Okkalapa Township, Yangon, Myanmar.<br><strong>Tel: +95 9 509 5013</strong>
            </p>
        </div>

        <div class="input-group">
            <label>Customer Name</label>
            <input type="text" id="custName" placeholder="Enter name" autocomplete="off" spellcheck="false" onfocus="this.select()">
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" placeholder="09..." autocomplete="off" onfocus="this.select()">
        </div>
        <div class="input-group">
            <label>Date / Address</label>
            <input type="text" placeholder="Delivery address or date" autocomplete="off" spellcheck="false" onfocus="this.select()">
        </div>

        <table id="invoiceTable">
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th style="width: 40px; text-align: center;">Qty</th>
                    <th style="width: 80px; text-align: right;">Price</th>
                    <th style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="itemsContainer">
                <tr>
                    <td><input type="text" class="itemName" placeholder="e.g. Floral Dress" autocomplete="off" spellcheck="false" onfocus="this.select()"></td>
                    <td><input type="number" class="qty" value="1" min="1" oninput="calculateTotal()" style="text-align: center;" autocomplete="off" onfocus="this.select()"></td>
                    <td><input type="number" class="price" placeholder="0" min="0" oninput="calculateTotal()" style="text-align: right;" autocomplete="off" onfocus="this.select()"></td>
                    <td><button type="button" class="remove-btn" onclick="removeItem(this)">X</button></td>
                </tr>
            </tbody>
        </table>
        
        <button type="button" class="add-btn" onclick="addItem()">+ Add Item</button>

        <div class="summary-box">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span><span id="subTotal">0</span> Ks</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee:</span>
                <input type="number" id="deliFee" placeholder="0" min="0" oninput="calculateTotal()" style="width: 80px;" autocomplete="off" onfocus="this.select()">
            </div>
            <div class="total-row">
                <span>Total:</span>
                <span><span id="finalTotal">0</span> Ks</span>
            </div>
        </div>

        <div class="thank-you">
            ~ Thank You For Shopping With May ~
        </div>
    </div>

    <div class="controls-container">
        <button type="button" class="print-btn" id="saveBtn" onclick="saveAsImage()">Save Invoice</button>
        <div id="loadingMsg">Generating image... Please wait...</div>
    </div>
</div>

<div id="resultView">
    <div class="result-card">
        <img id="generatedImg" src="" alt="Invoice Image">
        <br><br>
        <button type="button" class="back-btn" onclick="goBackToMain()">« Go Back & Start New</button>
    </div>
</div>

<div id="historyView">
    <div class="history-card">
        <div class="history-header">
            <h2>Sales Report (Online)</h2>
            <button class="close-history" onclick="closeHistory()">Close</button>
        </div>
        
        <div class="filter-group">
            <input type="date" id="filterDate" onchange="applyFilter()">
            <input type="month" id="filterMonth" onchange="applyFilter()">
        </div>
        <div style="text-align: center; margin-bottom: 15px;">
            <button onclick="clearFilters()" style="background: #888; color:white; border:none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Show All Time</button>
        </div>

        <div class="total-sales-badge">
            Total Sales: <span id="historyTotalAmount">0</span> Ks
        </div>

        <div id="historyList">
            </div>
    </div>
</div>

<script>
    // --- Google Sheets API Link ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwM80GzKNRSw1gExBuo8bbByHDTbEUtPCyZ9hZoszZ3NgeOGE5XG4GbCNPFh0zuys2P/exec";
    
    // မှတ်တမ်းအားလုံးကို ယာယီသိမ်းထားမည့် ကိန်းရှင်
    let onlineRecords = [];

    // --- Invoice Logic ---
    function calculateTotal() {
        let subTotal = 0;
        let rows = document.querySelectorAll('#itemsContainer tr');
        rows.forEach(row => {
            let qty = row.querySelector('.qty').value || 0;
            let price = row.querySelector('.price').value || 0;
            subTotal += (qty * price);
        });
        
        let deliFee = parseInt(document.getElementById('deliFee').value || 0);
        let finalTotal = subTotal + deliFee;
        
        document.getElementById('subTotal').innerText = subTotal.toLocaleString();
        document.getElementById('finalTotal').innerText = finalTotal.toLocaleString();
        return finalTotal; 
    }

    function addItem() {
        let tbody = document.getElementById('itemsContainer');
        let newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><input type="text" class="itemName" placeholder="e.g. Floral Dress" autocomplete="off" spellcheck="false" onfocus="this.select()"></td>
            <td><input type="number" class="qty" value="1" min="1" oninput="calculateTotal()" style="text-align: center;" autocomplete="off" onfocus="this.select()"></td>
            <td><input type="number" class="price" placeholder="0" min="0" oninput="calculateTotal()" style="text-align: right;" autocomplete="off" onfocus="this.select()"></td>
            <td><button type="button" class="remove-btn" onclick="removeItem(this)">X</button></td>
        `;
        tbody.appendChild(newRow);
        calculateTotal();
    }

    function removeItem(btn) {
        btn.closest('tr').remove();
        calculateTotal();
    }

    // --- Google Sheets သို့ စာရင်းပို့ခြင်း ---
    function saveRecordToOnline() {
        let totalAmount = calculateTotal();
        if(totalAmount === 0) return; 

        let customer = document.getElementById('custName').value || 'Unknown Customer';
        
        let itemNames = [];
        document.querySelectorAll('.itemName').forEach(input => {
            if(input.value.trim() !== '') itemNames.push(input.value.trim());
        });
        let itemsSummary = itemNames.length > 0 ? itemNames.join(', ') : 'Items';

        let now = new Date();
        let dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // POST Data တွဲခြင်း
        let formData = new URLSearchParams();
        formData.append('action', 'insert');
        formData.append('date', dateStr);
        formData.append('time', timeStr);
        formData.append('customer', customer);
        formData.append('items', itemsSummary);
        formData.append('totalAmount', totalAmount);

        // API သို့ ပို့ခြင်း (Background တွင် လုပ်ဆောင်မည်)
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData
        }).then(res => res.text()).catch(err => console.log(err));
    }

    // --- History View Logic ---
    function openHistory() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('historyView').style.display = 'block';
        
        let today = new Date();
        let dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        document.getElementById('filterDate').value = dateStr;
        document.getElementById('filterMonth').value = '';
        
        fetchOnlineHistory();
    }

    function closeHistory() {
        document.getElementById('historyView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
    }

    function fetchOnlineHistory() {
        let listContainer = document.getElementById('historyList');
        listContainer.innerHTML = '<div class="loading-text">Loading data from Google Sheets... ⏳</div>';
        document.getElementById('historyTotalAmount').innerText = "0";

        // Google Sheet မှ စာရင်းများကို လှမ်းယူခြင်း
        fetch(SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                onlineRecords = data; // ရလာသောစာရင်းကို သိမ်းထားမည်
                applyFilter(); // Filter ပြန်စစ်မည်
            })
            .catch(error => {
                listContainer.innerHTML = '<div class="loading-text" style="color:red;">Failed to load data. Please check internet connection.</div>';
            });
    }

    function applyFilter() {
        let listContainer = document.getElementById('historyList');
        let totalAmountEl = document.getElementById('historyTotalAmount');
        let selectedDate = document.getElementById('filterDate').value;
        let selectedMonth = document.getElementById('filterMonth').value;
        
        let filteredRecords = [];

        if (selectedDate !== "") {
            document.getElementById('filterMonth').value = ''; 
            filteredRecords = onlineRecords.filter(r => r.date === selectedDate);
        } else if (selectedMonth !== "") {
            document.getElementById('filterDate').value = ''; 
            // monthStr သည် YYYY-MM ဖြစ်သဖြင့် ရက်စွဲမှ အစစာလုံး ၇ လုံးကို ယူစစ်မည်
            filteredRecords = onlineRecords.filter(r => r.date.substring(0, 7) === selectedMonth);
        } else {
            filteredRecords = onlineRecords; // အားလုံးပြမည်
        }

        // နောက်ဆုံးရောင်းရတာကို အပေါ်ဆုံးထားမည်
        filteredRecords.reverse(); 

        listContainer.innerHTML = '';
        let calcTotal = 0;

        if (filteredRecords.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:#888;">No records found for this period.</p>';
        } else {
            filteredRecords.forEach(record => {
                calcTotal += Number(record.totalAmount);
                let itemDiv = document.createElement('div');
                itemDiv.className = 'record-item';
                itemDiv.innerHTML = `
                    <div class="record-title">
                        <span>${record.customer}</span>
                        <span class="record-amount">${Number(record.totalAmount).toLocaleString()} Ks</span>
                    </div>
                    <div class="record-detail">
                        <span>📅 ${record.date} (${record.time})<br>🛍️ ${record.items}</span>
                        <button class="delete-record-btn" onclick="deleteOnlineRecord(${record.row})">❌ Delete</button>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }
        
        totalAmountEl.innerText = calcTotal.toLocaleString();
    }

    function clearFilters() {
        document.getElementById('filterDate').value = '';
        document.getElementById('filterMonth').value = '';
        applyFilter();
    }

    // Google Sheet ထဲမှ မှားသောစာရင်းကို ဖျက်ခြင်း
    function deleteOnlineRecord(rowNumber) {
        if(confirm("Are you sure you want to delete this specific record from Cloud?")) {
            let listContainer = document.getElementById('historyList');
            listContainer.innerHTML = '<div class="loading-text">Deleting record... ⏳</div>';

            let formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('row', rowNumber);

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
            }).then(res => res.text()).then(data => {
                // ဖျက်ပြီးပါက စာရင်းအသစ် ပြန်ခေါ်မည်
                fetchOnlineHistory();
            }).catch(err => {
                alert("Delete failed.");
                fetchOnlineHistory();
            });
        }
    }

    // --- Data Reset & Go Back Logic ---
    function goBackToMain() {
        document.getElementById('resultView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
        
        let textInputs = document.querySelectorAll('.input-group input');
        textInputs.forEach(input => input.value = '');
        
        document.getElementById('deliFee').value = '';

        let tbody = document.getElementById('itemsContainer');
        tbody.innerHTML = `
            <tr>
                <td><input type="text" class="itemName" placeholder="e.g. Floral Dress" autocomplete="off" spellcheck="false" onfocus="this.select()"></td>
                <td><input type="number" class="qty" value="1" min="1" oninput="calculateTotal()" style="text-align: center;" autocomplete="off" onfocus="this.select()"></td>
                <td><input type="number" class="price" placeholder="0" min="0" oninput="calculateTotal()" style="text-align: right;" autocomplete="off" onfocus="this.select()"></td>
                <td><button type="button" class="remove-btn" onclick="removeItem(this)">X</button></td>
            </tr>
        `;
        
        calculateTotal();
        window.scrollTo(0, 0); 
    }

    // --- Image Generation Logic ---
    function saveAsImage() {
        window.scrollTo(0, 0);
        
        // ဓာတ်ပုံမရိုက်မီ Google Sheet သို့ စာရင်းပို့မည်
        saveRecordToOnline();

        let container = document.getElementById('invoiceCard');
        let saveBtn = document.getElementById('saveBtn');
        let loadingMsg = document.getElementById('loadingMsg');

        saveBtn.style.display = 'none';
        loadingMsg.style.display = 'block';
        container.classList.add('exporting');

        let inputs = container.querySelectorAll('input');
        inputs.forEach(input => {
            let span = document.createElement('span');
            span.className = 'temp-text';
            span.innerText = input.value || ' '; 
            if(input.classList.contains('qty') || input.style.textAlign === 'center') span.style.textAlign = 'center';
            if(input.classList.contains('price') || input.style.textAlign === 'right') span.style.textAlign = 'right';
            if(input.id === 'deliFee') span.style.textAlign = 'right';
            input.parentNode.insertBefore(span, input);
            input.style.display = 'none';
        });

        setTimeout(() => {
            html2canvas(container, { scale: 2, backgroundColor: "#ffffff", logging: false, useCORS: true }).then(canvas => {
                let tempTexts = container.querySelectorAll('.temp-text');
                tempTexts.forEach(span => span.remove());
                inputs.forEach(input => input.style.display = '');

                container.classList.remove('exporting');
                saveBtn.style.display = 'block';
                loadingMsg.style.display = 'none';

                let imgData = canvas.toDataURL('image/jpeg', 0.95);
                document.getElementById('generatedImg').src = imgData;
                document.getElementById('mainView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
                window.scrollTo(0, 0); 
            }).catch(err => {
                let tempTexts = container.querySelectorAll('.temp-text');
                tempTexts.forEach(span => span.remove());
                inputs.forEach(input => input.style.display = '');
                
                if(err.message.includes("Tainted")) {
                    alert("ပုံသိမ်း၍မရပါ။ ဖိုင်ကို ဖုန်းထဲမှ တိုက်ရိုက်ဖွင့်ထားသောကြောင့် လုံခြုံရေးအရ ပိတ်ထားခြင်းဖြစ်ပါသည်။ ကျေးဇူးပြု၍ GitHub လင့်ခ် (https://...) မှ ဝင်ရောက်အသုံးပြုပါ။");
                } else {
                    alert("Cannot generate image. (Error: " + err.message + ")");
                }

                saveBtn.style.display = 'block';
                loadingMsg.style.display = 'none';
                container.classList.remove('exporting');
            });
        }, 500); 
    }
</script>

</body>
</html>
