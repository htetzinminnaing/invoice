<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dressup By May">
    
    <title>Dressup By May - Invoice & Sales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* (၂) Pull to Refresh CSS */
        html, body {
            overflow-y: auto;
            overscroll-behavior-y: contain; 
            -webkit-overflow-scrolling: touch;
        }
        body { font-family: Arial, sans-serif; background-color: #fce4ec; margin: 0; padding: 10px; color: #333; }
        .app-container { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding-bottom: 25px; max-width: 600px; margin: auto; position: relative; }
        
        #refresh-indicator {
            text-align: center; height: 0; overflow: hidden; transition: height 0.2s; color: #d81b60; font-weight: bold; font-size: 13px;
        }

        .header { text-align: center; border-bottom: 2px solid #d81b60; padding-bottom: 12px; margin-bottom: 15px; }
        .header img.shop-logo { width: 100%; max-width: 250px; height: auto; border-radius: 8px; margin-bottom: 8px; }
        .header .shop-address { color: #555; font-size: 11px; margin-top: 5px; line-height: 1.5; }
        #displayCurrentDate { text-align: right; font-size: 12px; font-weight: bold; color: #d81b60; margin-bottom: 6px; }

        .input-group { display: flex; align-items: center; margin-bottom: 12px; }
        .input-group label { width: 110px; min-width: 110px; font-weight: bold; color: #555; font-size: 13px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background-color: #fafafa; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #fce4ec; color: #d81b60; padding: 10px 4px; text-align: left; font-size: 13px; border: 1px solid #d81b60; }
        td { padding: 4px 2px; border: 1px solid #f8bbd0; }
        td input { width: 100%; padding: 10px 4px; border: none; font-size: 14px; background: transparent; }
        
        .add-btn { width: 100%; background-color: #fce4ec; color: #d81b60; border: 2px dashed #d81b60; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .summary-box { background: #fff0f4; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1.5px solid #d81b60; }
        .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; color: #d81b60; border-top: 2px solid #d81b60; padding-top: 8px; }

        .top-nav { max-width: 600px; margin: 0 auto 10px auto; text-align: right; }
        .report-btn { background: #d81b60; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; }

        #historyView { display: none; padding: 10px; max-width: 600px; margin: auto; min-height: 100vh; background-color: #fce4ec; }
        .record-item { background: #fffafb; border: 1px solid #f8bbd0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        
        #resultView { display: none; text-align: center; padding: 20px; }
        #generatedImg { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body id="swipe-area">

<div id="refresh-indicator">Updating Code... 🔄</div>

<div id="mainView">
    <div class="top-nav">
        <button class="report-btn" onclick="openHistory()">📊 Online Sales Report</button>
    </div>

    <div class="app-container" id="invoiceCard">
        <div class="header">
            <img src="logo.jpg" alt="Logo" class="shop-logo">
            <p class="shop-address">No.428(A), Thuta Street, Okkalapa, Yangon. <strong>Tel: +95 9 509 5013</strong></p>
        </div>
        <div id="displayCurrentDate">Date: </div>
        <div class="input-group"><label>Customer Name</label><input type="text" id="custName" placeholder="Enter name"></div>
        <div class="input-group"><label>Phone Number</label><input type="text" id="phone" placeholder="09..."></div>
        <div class="input-group"><label>Address</label><input type="text" id="address" placeholder="Address"></div>
        <div class="input-group"><label>Note</label><input type="text" id="note" placeholder="Remarks"></div>

        <table id="invoiceTable">
            <thead><tr><th>Item Name</th><th style="width: 40px;">Qty</th><th style="width: 80px;">Price</th><th style="width: 30px;"></th></tr></thead>
            <tbody id="itemsContainer">
                <tr>
                    <td><input type="text" class="itemName" placeholder="Item"></td>
                    <td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" placeholder="0" oninput="calculateTotal()"></td>
                    <td><button onclick="this.closest('tr').remove();calculateTotal()" style="background:red;color:white;border:none;border-radius:4px;">X</button></td>
                </tr>
            </tbody>
        </table>
        <button class="add-btn" onclick="addItem()">+ Add Item</button>
        <div class="summary-box">
            <div style="display:flex;justify-content:space-between"><span>Subtotal:</span><span id="subTotal">0</span> Ks</div>
            <div style="display:flex;justify-content:space-between;margin:8px 0"><span>Delivery Fee:</span><input type="number" id="deliFee" value="0" oninput="calculateTotal()" style="width:80px;text-align:right"></div>
            <div class="total-row"><span>Total:</span><span><span id="finalTotal">0</span> Ks</span></div>
        </div>
    </div>
    <div style="margin-top:20px"><button class="report-btn" style="width:100%;padding:15px" onclick="saveAsImage()">Save Invoice</button></div>
</div>

<div id="historyView">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
        <h2 style="color:#d81b60;margin:0">Online Sales Report</h2>
        <button onclick="closeHistory()" style="background:#555;color:white;border:none;padding:8px 15px;border-radius:6px">Close</button>
    </div>
    <div id="historyList"></div>
</div>

<div id="resultView">
    <img id="generatedImg" src="">
    <button class="report-btn" style="width:100%;margin-top:20px;background:#555" onclick="location.reload()">Back to New Invoice</button>
</div>

<script>
    // (၃) Version စစ်ဆေးခြင်း- GitHub ပေါ်က Code အသစ်ရှိရင် အလိုအလျောက် Refresh လုပ်ပေးမည့် Script
    // Code တင်ပြီးတိုင်း Version နံပါတ်ကို ၁ တိုးပေးပါ။
    const APP_VERSION = "1.0.1"; 

    function checkUpdate() {
        if(localStorage.getItem('app_version') !== APP_VERSION) {
            localStorage.setItem('app_version', APP_VERSION);
            // Version မတူရင် အတင်း Refresh လုပ်ပြီး Code အသစ်ကို ယူခိုင်းခြင်း
            window.location.reload(true); 
        }
    }
    checkUpdate();

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLgvYEDVw0mgftIaF0DgzCQapiMTPVuE_5eTCxRknJHE0_h-xJO5Zz1zwOu_DTY-KP/exec";

    // --- Pull to Refresh ---
    let startY = 0;
    const swipeArea = document.getElementById('swipe-area');
    const indicator = document.getElementById('refresh-indicator');

    swipeArea.addEventListener('touchstart', (e) => {
        if (window.scrollY === 0) startY = e.touches[0].pageY;
    }, {passive: true});

    swipeArea.addEventListener('touchmove', (e) => {
        const moveY = e.touches[0].pageY;
        const pullDistance = moveY - startY;
        if (window.scrollY === 0 && pullDistance > 0 && pullDistance < 100) {
            indicator.style.height = pullDistance + 'px';
        }
    }, {passive: true});

    swipeArea.addEventListener('touchend', (e) => {
        const pullDistance = e.changedTouches[0].pageY - startY;
        if (window.scrollY === 0 && pullDistance > 60) {
            indicator.style.height = '30px';
            location.reload(true);
        } else {
            indicator.style.height = '0px';
        }
    });

    // --- Main Logics ---
    function calculateTotal() {
        let sub = 0;
        document.querySelectorAll('#itemsContainer tr').forEach(row => {
            let q = row.querySelector('.qty').value || 0;
            let p = row.querySelector('.price').value || 0;
            sub += (q * p);
        });
        let deli = parseInt(document.getElementById('deliFee').value || 0);
        document.getElementById('subTotal').innerText = sub.toLocaleString();
        document.getElementById('finalTotal').innerText = (sub + deli).toLocaleString();
        return sub + deli;
    }

    function addItem() {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="itemName" placeholder="Item"></td>
                        <td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td>
                        <td><input type="number" class="price" placeholder="0" oninput="calculateTotal()"></td>
                        <td><button onclick="this.closest('tr').remove();calculateTotal()" style="background:red;color:white;border:none;border-radius:4px;">X</button></td>`;
        document.getElementById('itemsContainer').appendChild(tr);
    }

    function openHistory() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('historyView').style.display = 'block';
        loadHistory();
    }

    function closeHistory() {
        document.getElementById('historyView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
    }

    function loadHistory() {
        let list = document.getElementById('historyList');
        list.innerHTML = 'Loading Database... ⏳';
        fetch(SCRIPT_URL + "?t=" + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                data.reverse().forEach(r => {
                    let div = document.createElement('div');
                    div.className = 'record-item';
                    div.innerHTML = `<div style="display:flex;justify-content:space-between;font-weight:bold;color:#d81b60"><span>👤 ${r.customer}</span><span>${parseInt(r.totalAmount).toLocaleString()} Ks</span></div>
                                     <div style="font-size:12px;margin:8px 0">${r.items}</div>
                                     <div style="font-size:11px;color:#888">🕒 ${r.date} (${r.time})</div>`;
                    list.appendChild(div);
                });
            });
    }

    function saveAsImage() {
        let items = [];
        document.querySelectorAll('#itemsContainer tr').forEach(row => {
            let n = row.querySelector('.itemName').value;
            let q = row.querySelector('.qty').value;
            if(n) items.push(`${q}x ${n}`);
        });

        let fd = new URLSearchParams();
        fd.append('action', 'insert');
        fd.append('date', new Date().toISOString().split('T')[0]);
        fd.append('time', new Date().toLocaleTimeString());
        fd.append('customer', document.getElementById('custName').value || 'Guest');
        fd.append('items', items.join(' | '));
        fd.append('totalAmount', calculateTotal());
        fetch(SCRIPT_URL, {method:'POST', body:fd});

        let card = document.getElementById('invoiceCard');
        html2canvas(card, {scale:2}).then(canvas => {
            document.getElementById('generatedImg').src = canvas.toDataURL('image/jpeg', 0.9);
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('resultView').style.display = 'block';
        });
    }

    let now = new Date();
    document.getElementById('displayCurrentDate').innerText = "Date: " + now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
</script>
</body>
</html>
