<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dressup">
    
    <title>Dressup By May - Invoice & Sales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        html, body { overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
        body { font-family: Arial, sans-serif; background-color: #fce4ec; margin: 0; padding: 10px; color: #333; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { width: 20px; height: 20px; border: 3px solid #f8bbd0; border-top: 3px solid #d81b60; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 10px; }

        /* --- Strict Login Screen CSS --- */
        #loginView { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 95vh; padding: 20px; }
        .login-card { background: #fff; padding: 35px 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(216,27,96,0.15); width: 100%; max-width: 350px; text-align: center; box-sizing: border-box; }
        .login-card img { width: 100%; max-width: 140px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .login-card h2 { color: #d81b60; margin: 0 0 20px 0; font-size: 22px; font-weight: bold; }
        .login-input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #f8bbd0; border-radius: 8px; font-size: 18px; text-align: center; box-sizing: border-box; font-weight: bold; letter-spacing: 2px; }
        .login-input:focus { border-color: #d81b60; outline: none; background-color: #fffafb; }
        .login-btn { width: 100%; padding: 14px; background: #d81b60; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .login-btn:active { transform: scale(0.96); background: #c2185b; }
        #loginError { color: red; font-size: 13px; margin-top: 10px; font-weight: bold; display: none; }
        .sync-status { font-size: 10px; color: #888; margin-top: 15px; font-style: italic; }

        /* --- Main App CSS --- */
        .app-container { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding-bottom: 25px; max-width: 600px; margin: auto; position: relative; overflow: hidden; }
        .watermark { display: none; }
        .app-container.exporting .watermark { display: flex; justify-content: center; align-items: center; position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none; opacity: 0.06; }
        .app-container.exporting .watermark img { width: 90%; max-width: 400px; height: auto; }

        .top-nav { max-width: 600px; margin: 0 auto 10px auto; text-align: right; display: flex; justify-content: flex-end; gap: 6px; }
        .report-btn { background: #d81b60; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        
        .header { text-align: center; border-bottom: 2px solid #d81b60; padding-bottom: 12px; margin-bottom: 15px; }
        .header img.shop-banner { width: 100%; height: auto; border-radius: 8px; display: block; margin: 0 auto; }
        .header .shop-address { color: #555; font-size: 11px; margin-top: 5px; line-height: 1.5; }
        
        .input-group { display: flex; align-items: flex-start; margin-bottom: 12px; }
        .input-group label { width: 125px; font-weight: 600; color: #666; font-size: 14px; padding-top: 10px; }
        .input-group input { flex: 1; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 15px; font-weight: bold; color: #222; background-color: #fafafa; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #fce4ec; color: #d81b60; padding: 12px 10px; text-align: left; font-size: 14px; border: 1px solid #d81b60; }
        td { border: 1px solid #f8bbd0; }
        td input { width: 100%; padding: 14px 10px; border: none; font-size: 15px; background: transparent; box-sizing: border-box; }
        
        .remove-btn { background: #ff5252; color: white; border: none; border-radius: 4px; padding: 10px; font-size: 13px; cursor: pointer; }
        .add-btn { width: 100%; background-color: #fce4ec; color: #d81b60; border: 2px dashed #d81b60; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 12px; }
        
        .summary-box { background: #fff0f4; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1.5px solid #d81b60; }
        .total-row { display: flex; justify-content: space-between; font-size: 17px; font-weight: bold; color: #d81b60; margin-top: 10px; padding-top: 10px; border-top: 2px solid #d81b60; }
        
        .temp-text { display: block; width: 100%; font-size: 15px; color: #000; font-weight: bold; }
        .temp-text.header-text { line-height: 1.4; border-bottom: 1px dotted #ccc; padding-bottom: 5px; }

        #resultView, #historyView { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .result-card, .history-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-card img { max-width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .back-btn { background: #555; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; }
        .record-item { background: #fffafb; border: 1px solid #f8bbd0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    </style>
</head>
<body id="main-body">

    <div id="loginView">
        <div class="login-card">
            <img src="logo.jpg" alt="Dressup Logo">
            <h2>Dressup App Lock</h2>
            <input type="password" id="passInput" class="login-input" placeholder="Enter Passcode" autocomplete="off">
            <button class="login-btn" onclick="verifyPassword()">Unlock App</button>
            <p id="loginError">❌ Wrong Password! Try again.</p>
            <div id="syncStatus" class="sync-status">Checking for updated password...</div>
        </div>
        <p style="margin-top: 20px; font-size: 12px; color: #888;">&copy; Dressup By May</p>
    </div>

    <div id="mainView" style="display: none;">
        <div class="top-nav">
            <button class="report-btn" onclick="lockApp()" style="background-color: #607d8b;">🔒 Lock</button>
            <button class="report-btn" onclick="changePassword()" style="background-color: #ff9800;">🔑 Pass</button>
            <button class="report-btn" onclick="openHistory()">📊 Report</button>
        </div>
        
        <div class="app-container" id="invoiceCard">
            <div class="watermark"><img src="logo.jpg" alt="Watermark"></div>
            <div class="header">
                <img src="banner.jpg" alt="Banner" class="shop-banner">
                <p class="shop-address">No.428(A), South Okkalapa, Yangon. <strong>Tel: +95 9 509 5013</strong></p>
            </div>
            <div style="text-align: right; margin-bottom: 10px; font-weight: bold; color: #d81b60;" id="displayCurrentDate">Date: </div>
            <div class="input-group"><label>Customer Name</label><input type="text" id="custName" class="header-input"></div>
            <div class="input-group"><label>Phone Number</label><input type="text" id="phone" class="header-input"></div>
            <div class="input-group"><label>Address</label><input type="text" id="address" class="header-input"></div>
            <div class="input-group"><label>Note</label><input type="text" id="note" class="header-input"></div>
            <table id="invoiceTable">
                <thead><tr><th>Item Name</th><th style="width: 40px;">Qty</th><th style="width: 80px;">Price</th><th style="width: 30px;"></th></tr></thead>
                <tbody id="itemsContainer"><tr><td><input type="text" class="itemName"></td><td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td><td><input type="number" class="price" oninput="calculateTotal()"></td><td><button class="remove-btn" onclick="removeItem(this)">X</button></td></tr></tbody>
            </table>
            <button class="add-btn" onclick="addItem()">+ Add Item</button>
            <div class="summary-box">
                <div style="display:flex;justify-content:space-between"><span>Subtotal:</span><span><span id="subTotal">0</span> Ks</span></div>
                <div style="display:flex;justify-content:space-between;margin:10px 0"><span>Delivery Fee:</span><input type="number" id="deliFee" oninput="calculateTotal()" style="width:90px;text-align:right;"></div>
                <div class="total-row"><span>Total:</span><span><span id="finalTotal">0</span> Ks</span></div>
            </div>
            <div class="thank-you" style="text-align:center;margin-top:25px;color:#d81b60;font-style:italic;display:none;font-weight:bold;">~ Thank You For Shopping With May ~</div>
        </div>
        <button class="login-btn" style="width:100%;margin-top:20px;" onclick="saveAsImage()">Save Invoice</button>
    </div>

    <div id="resultView">
        <div class="result-card"><img id="generatedImg" src=""><br><br><button class="back-btn" onclick="goBackToMain()">« Create New Invoice</button></div>
    </div>

    <div id="historyView">
        <div class="history-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h2 style="color:#d81b60;margin:0">Sales Report</h2><button class="report-btn" style="background:#555" onclick="closeHistory()">Close</button></div>
            <div id="historyList"></div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLgvYEDVw0mgftIaF0DgzCQapiMTPVuE_5eTCxRknJHE0_h-xJO5Zz1zwOu_DTY-KP/exec";
    
    // --- Security Center ---
    let CURRENT_PASS = localStorage.getItem('dressup_global_pass') || "May123";
    let PASS_ROW_ID = null;

    window.onload = function() {
        setCurrentDate();
        // Database မှ Password အသစ် ရှိ/မရှိ နောက်ကွယ်မှ စစ်မည်
        fetch(SCRIPT_URL + "?t=" + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                let pRec = data.find(r => r.customer === "SYS_PASS_KEY");
                if(pRec) {
                    CURRENT_PASS = pRec.items;
                    PASS_ROW_ID = pRec.row;
                    localStorage.setItem('dressup_global_pass', CURRENT_PASS);
                    document.getElementById('syncStatus').innerText = "✅ Password synchronized with server.";
                }
            }).catch(() => { document.getElementById('syncStatus').innerText = "⚠️ Offline mode: Using last known password."; });

        if (sessionStorage.getItem('dressup_auth') === 'open') {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
        }
    };

    function verifyPassword() {
        if (document.getElementById('passInput').value === CURRENT_PASS) {
            sessionStorage.setItem('dressup_auth', 'open');
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function lockApp() { sessionStorage.removeItem('dressup_auth'); window.location.reload(); }

    function changePassword() {
        let oldP = prompt("Enter Current Password:");
        if (oldP !== CURRENT_PASS) return alert("Wrong Password!");
        let newP = prompt("Enter New Global Password:");
        if (!newP || newP.trim().length < 4) return alert("Too short!");

        alert("Updating global password... App will reload.");
        let fd = new URLSearchParams();
        fd.append('action', 'insert'); fd.append('customer', 'SYS_PASS_KEY'); fd.append('items', newP); fd.append('totalAmount', 0);
        
        if (PASS_ROW_ID) {
            let fdDel = new URLSearchParams(); fdDel.append('action', 'delete'); fdDel.append('row', PASS_ROW_ID);
            fetch(SCRIPT_URL, { method: 'POST', body: fdDel }).then(() => fetch(SCRIPT_URL, { method: 'POST', body: fd }).then(() => lockApp()));
        } else {
            fetch(SCRIPT_URL, { method: 'POST', body: fd }).then(() => lockApp());
        }
    }

    // --- Core Functions ---
    function setCurrentDate() { document.getElementById('displayCurrentDate').innerText = "Date: " + new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function calculateTotal() { let s = 0; document.querySelectorAll('#itemsContainer tr').forEach(r => { s += (r.querySelector('.qty').value * r.querySelector('.price').value || 0); }); let d = parseInt(document.getElementById('deliFee').value || 0); document.getElementById('subTotal').innerText = s.toLocaleString(); document.getElementById('finalTotal').innerText = (s + d).toLocaleString(); return s + d; }
    function addItem() { let tr = document.createElement('tr'); tr.innerHTML = `<td><input type="text" class="itemName"></td><td><input type="number" class="qty" value="1" oninput="calculateTotal()"></td><td><input type="number" class="price" oninput="calculateTotal()"></td><td><button class="remove-btn" onclick="removeItem(this)">X</button></td>`; document.getElementById('itemsContainer').appendChild(tr); }
    function removeItem(btn) { btn.closest('tr').remove(); calculateTotal(); }
    function openHistory() { document.getElementById('mainView').style.display = 'none'; document.getElementById('historyView').style.display = 'block'; loadHistory(); }
    function closeHistory() { document.getElementById('historyView').style.display = 'none'; document.getElementById('mainView').style.display = 'block'; }
    function loadHistory() {
        let list = document.getElementById('historyList'); list.innerHTML = 'Loading...';
        fetch(SCRIPT_URL + "?t=" + new Date().getTime()).then(res => res.json()).then(data => {
            list.innerHTML = '';
            data.filter(r => r.customer !== "SYS_PASS_KEY").reverse().forEach(r => {
                let div = document.createElement('div'); div.className = 'record-item';
                div.innerHTML = `<div style="display:flex;justify-content:space-between;font-weight:bold;color:#d81b60"><span>👤 ${r.customer}</span><span>${parseInt(r.totalAmount).toLocaleString()} Ks</span></div><div style="font-size:12px;margin:5px 0">${r.items}</div>`;
                list.appendChild(div);
            });
        });
    }

    function saveAsImage() {
        let items = []; document.querySelectorAll('#itemsContainer tr').forEach(r => { let n = r.querySelector('.itemName').value; if(n) items.push(`${r.querySelector('.qty').value}x ${n} ^ ${r.querySelector('.price').value}`); });
        let fd = new URLSearchParams(); fd.append('action', 'insert'); fd.append('date', new Date().toISOString().split('T')[0]); fd.append('time', new Date().toLocaleTimeString()); fd.append('customer', document.getElementById('custName').value || 'Guest'); fd.append('items', items.join(' | ')); fd.append('totalAmount', calculateTotal());
        fetch(SCRIPT_URL, { method: 'POST', body: fd });
        
        let card = document.getElementById('invoiceCard'); card.classList.add('exporting');
        document.querySelectorAll('.header-input').forEach(i => {
            if(i.value) { let s = document.createElement('span'); s.className = 'temp-text header-text'; s.innerText = i.value; i.parentNode.insertBefore(s, i); }
            i.style.display = 'none';
        });
        document.querySelectorAll('.itemName, .qty, .price').forEach(i => {
            let s = document.createElement('span'); s.className = 'temp-text'; s.innerText = i.value; i.parentNode.insertBefore(s, i); i.style.display = 'none';
        });
        document.querySelector('.thank-you').style.display = 'block';
        
        html2canvas(card, { scale: 2 }).then(canvas => {
            document.getElementById('generatedImg').src = canvas.toDataURL('image/jpeg', 0.9);
            document.getElementById('mainView').style.display = 'none'; document.getElementById('resultView').style.display = 'block';
        });
    }
    function goBackToMain() { window.location.reload(); }
</script>
</body>
</html>
